  <script>
    function showme() {
      Swal.fire({
        title: 'Welcome',

        imageUrl: "https://ugc.production.linktr.ee/07d2a302-4be8-4dd9-9640-54a3107d1d85_20240829-145159-picsay.jpeg?io=true&size=avatar-v1_0",

        imageWidth: 200,
        imageHeight: 200,
        customClass: {
          image: 'image-swal'
        },
        confirmButtonText: 'Lets get Started'
      });
      console.log("Ini baris 18, sudah sampai disini");
      a = 18 + 18;
      console.log("Hasil dari 18+18 adalah " + a);
      c = 1 * 2 * 3 * 4 * 5;
      console.log("Hasil dari 1*2*3*4*5 adalah " + c);
    }
    function changetext() {
      const element = document.getElementById("intro");
      element.innerHTML = "Sistem Informasi";
    }
    function changetext() {
      const element = document.getElementById("intro");
      element.innerHTML = "Sistem Informasi";
    }
    function changestyle() {
      const element = document.getElementById("anchor");
      element.style.color = "red";
      element.style.fontWeight = "bold";
    }
    function undo() {
      const element = document.getElementById("anchor");
      element.style.color = "";
      element.style.fontWeight = "";
      document.getElementById("intro").innerHTML = "Katharsis | WuWa Pilot";

  <style>
    /* Base */
    html {
      background-color: #2a3235;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background-color: rgb(42, 50, 53);
      display: flex;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding-top: 40px;
    }

    h1,

      color: #ffffff;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    h3 {
      font-size: 1rem;
      padding-top: 2.5%;
    }

    .image-swal {
      border-radius: 50%;
      object-fit: cover;
    }

    /* Background Blur */
    .blur-bg {
      position: fixed;
      left: -5vw;
      top: -5vh;
      width: 110vw;
      height: 110dvh;
      background-image: url('https://ugc.production.linktr.ee/07d2a302-4be8-4dd9-9640-54a3107d1d85_20240829-145159-picsay.jpeg?io=true&size=avatar-v1_0');
      background-size: cover;
      background-position: center;
      filter: blur(50px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 580px;
      box-shadow: -60px 0 80px rgba(0, 0, 0, 0.6), 60px 0 80px rgba(0, 0, 0, 0.6);
      padding-left: 16px;
      padding-right: 16px;
      padding-top: 4px;
      min-height: 100vh;
      border-radius: 24px;
    }

    /* Navbar */
    .navbar {
      padding-left: 16px;
      padding-right: 16px;
      margin-top: 16px;
    }

    /* Tombol bulat (logo & share) */
    .btn.rounded-circle {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5%;
      opacity: 0.7;
      transition: opacity 0.15s ease;
    }

    .btn.rounded-circle:hover {
      opacity: 1;
    }

    /* Profile */
    .profile {
      font-size: 1rem;
    }

    /* Link Buttons */
    .btn-link-item {
      padding: 12px 16px;
      min-height: 64px;
      border-radius: 50px !important;
      overflow: hidden;
      width: 95%;
      margin-left: auto;
      margin-right: auto;
    }

    /* Thumbnail kiri */
    .thumbnail {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Label tengah - kasih padding biar ga nabrak thumbnail & titik 3 */
    .btn-link-item .flex-grow-1 {
      padding-left: 60px;
      padding-right: 28px;
    }

    .btn-link-item span.flex-grow-1 {
      padding-left: 32px;
    }

    /* Titik 3 kanan */
    .share-btn {
      position: absolute;
      right: 20px;
    }

    .share-btn:hover {
      border: #2a3235;
      border-radius: 50%;
    }

    footer {
      margin-top: auto;
    }

    /* Footer */
    .footer-link:hover {
      text-decoration: underline !important;
      text-underline-offset: 2px;
    }
  </style>
